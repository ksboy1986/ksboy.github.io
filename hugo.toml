baseURL = "https://www.chaoyuewang.cn/"
languageCode = "zh-cn"
title = "潮越网"
theme = "PaperMod"

# 分类系统配置
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# 导航菜单配置
[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[params]
  mode = "dark"
  defaultTheme = "dark"
  tocPosition = "right"
  showReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  showTaxonomyList = true
  taxonomyCardHeader = "分类"
  ShowToc = true
  TocOpen = true
  comments = false

[params.author]
  name = "ksboy"
  link = "https://www.chaoyuewang.cn/"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    noClasses = false

[privacy]
  [privacy.youtube]
    privacyEnhanced = true
