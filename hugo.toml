baseURL = "https://www.chaoyuewang.cn/"
title = "超越网"
theme = "PaperMod"

[params]
  mainSections = ["posts"]
  defaultTheme = "dark"
  showReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionMenu = true
  ShowFullTextinRSS = true
  ShowToc = true
  TocOpen = true
  comments = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false


