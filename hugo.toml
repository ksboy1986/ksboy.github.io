baseURL = "https://www.chaoyuewang.cn/"
languageCode = "zh-cn"
title = "潮越网"
theme = "PaperMod"

# 分类系统配置
[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"

# 导航菜单配置 - 分类直接显示在顶部
[[menu.main]]
  identifier = "infra"
  name = "AI 基础设施"
  url = "/categories/infra/"
  weight = 10

[[menu.main]]
  identifier = "ops"
  name = "运维实践"
  url = "/categories/ops/"
  weight = 20

[[menu.main]]
  identifier = "tools"
  name = "工具评测"
  url = "/categories/tools/"
  weight = 30

[[menu.main]]
  identifier = "meta"
  name = "日常随笔"
  url = "/categories/meta/"
  weight = 40

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 50

[params]
  mode = "dark"
  defaultTheme = "dark"
  showReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  showTaxonomyList = true
  taxonomyCardHeader = "分类"
  ShowToc = true
  TocOpen = true
  comments = false

[params.author]
  name = "ksboy"
  link = "https://www.chaoyuewang.cn/"

[outputs]
  home = ["HTML", "RSS"]

[markup]
  [markup.highlight]
    noClasses = false

[privacy]
  [privacy.youtube]
    privacyEnhanced = true
