baseURL = "https://www.chaoyuewang.cn/"
title = "超越网"
theme = "PaperMod"

# 分类系统配置
[taxonomies]
  category = "categories"
  tag = "tags"

[params.taxonomy]
  category = "分类"
  tag = "标签"

[params]
  mainSections = ["posts"]
  tocPosition = "right"
  defaultTheme = "dark"
  showReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionMenu = true
  ShowFullTextinRSS = true
  ShowToc = true
  TocOpen = true
  comments = false

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
